name: Run All Tests with Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
        tar -zxvf allure-2.24.0.tgz
        sudo mv allure-2.24.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
        allure --version
      
    - name: Run All Tests
      run: ./gradlew runAllTests --stacktrace
      continue-on-error: true

    - name: Generate Allure Report
      if: always()
      run: |
        if [ -d "build/allure-results" ] && [ "$(ls -A build/allure-results)" ]; then
          echo "Found Allure results. Generating report..."
          allure generate build/allure-results -o build/allure-report --clean
          echo "Allure report generated successfully"
        else
          echo "Warning: No Allure results found"
        fi
      continue-on-error: true

    - name: Upload Allure Results
      if: always() && hashFiles('build/allure-results') != ''
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: build/allure-results
      continue-on-error: true

    - name: Upload Allure Report
      if: always() && hashFiles('build/allure-report') != ''
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: build/allure-report
      continue-on-error: true

    - name: Upload TestNG Reports
      if: always() && hashFiles('build/reports/tests/') != ''
      uses: actions/upload-artifact@v4
      with:
        name: testng-reports
        path: build/reports/tests/
      continue-on-error: true

  # Optional: Deploy report to GitHub Pages
  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Download Allure Report
      uses: actions/download-artifact@v4
      with:
        name: allure-report
        path: allure-report
      continue-on-error: true

    - name: Check if Allure Report exists
      run: |
        if [ -d "allure-report" ] && [ "$(ls -A allure-report)" ]; then
          echo "Allure report found. Ready to deploy."
          exit 0
        else
          echo "Warning: Allure report directory is empty or missing."
          exit 0
        fi

    - name: Deploy to GitHub Pages
      if: hashFiles('allure-report') != ''
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: allure-report
        enable_jekyll: false
