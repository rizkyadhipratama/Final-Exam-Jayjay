name: Run All Tests with Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean previous Allure results
        run: |
          rm -rf allure-report
          rm -rf build/allure-results
          rm -rf build/reports/allure-report
          mkdir -p build/allure-results
          mkdir -p allure-report

      - name: Run Tests
        run: ./gradlew runAllTests --stacktrace
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: allure generate build/allure-results --clean -o allure-report
        continue-on-error: true

      - name: Debug — check report directory
        if: always()
        run: |
          echo "=== build/allure-results ==="
          ls build/allure-results || echo "allure-results not found"
          echo "=== build/reports/allure-report ==="
          ls -R build/reports/allure-report || echo "allure-report not found"

      - name: Upload Allure Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/reports/allure-report/allureReport
          retention-days: 7

  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Debug — check downloaded artifact
        run: |
          echo "=== Downloaded artifact contents ==="
          ls -R allure-report || echo "Nothing downloaded"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          enable_jekyll: false